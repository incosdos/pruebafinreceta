<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">📂 Categorías</h4>
                    <a href="/" class="btn btn-light btn-sm">← Volver</a>
                </div>
                <div class="card-body">

                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label fw-bold">
                                Seleccione una categoría
                            </label>
                            <select class="form-select" name="cat_id">
                                <option value="">--- Seleccionar ---</option>
                                {% for cat in categorias %}
                                <option value="{{ cat.id }}"
                                    {% if  id_categoria == cat.id|string %}
                                        selected
                                    {% endif %}
                                >
                                    {{ cat.nombre }}
                                </option>
                                {% endfor %}

                            </select>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary" type="submit">
                                Ver información
                            </button>
                        </div>

                    </form>

                    <hr>

                    <h5 class="mb-3">Ingredientes</h5>

                    {% if ingredientes %}
                    <ul class="list-group">
                        {% for ing in ingredientes %}
                        <li class="list-group-item d-flex justify-content-between align-items-center">
                            {{ ing.nombre }}
                            <span class="badge bg-secondary rounded-pill">{{ ing.unidad_medida }}</span>
                        </li>
                        {% endfor %}
                    </ul>
                    {% else %}
                    <div class="alert alert-warning">No hay ingredientes para mostrar.</div>
                    {% endif %}

                </div>

            </div>

        </div>
    </div>

</div>

</body>
</html>
